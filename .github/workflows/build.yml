name: Build JNode

on:
  push:
    branches:
      - master
      - main
      - work
  pull_request:

jobs:
  build:
    name: Ant build on Java 8
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm qemu-system-x86

      - name: Show tool versions
        run: |
          java -version
          javac -version
          nasm -v
          qemu-system-i386 --version || true

      - name: Validate XML build descriptors
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          for path in ('all/build.xml', 'gui/descriptors/org.jnode.desktop.xml'):
              ET.parse(path)
              print(path + ': ok')
          PY

      - name: Seed class library artifacts
        run: |
          set -eux
          rt_jar="$JAVA_HOME/jre/lib/rt.jar"
          src_zip="$JAVA_HOME/src.zip"
          test -f "$rt_jar"
          test -f "$src_zip"
          cp "$rt_jar" all/lib/classlib.jar
          cp "$src_zip" all/lib/classlib-src.jar
          touch all/lib/classlib.jar all/lib/classlib-src.jar

      - name: Assemble JNode
        run: ./build.sh -Djnode.local.classlib=true assemble

      - name: Build x86 lite ISO
        run: ./build.sh -Djnode.local.classlib=true cd-x86-lite

      - name: Upload ISO artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jnode-cdroms
          path: all/build/cdroms/*
          if-no-files-found: ignore
